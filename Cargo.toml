[package]
name = "foundation_vs_slop"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = "0.19.0"

# Bevy's recommended dev compile-speed profile: keep our own crate light so
# iteration is fast, but optimize dependencies so the engine runs at speed.
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 3
