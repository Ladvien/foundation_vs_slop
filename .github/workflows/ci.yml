name: CI

# Pure-CPU gate: the deterministic test suite (RNG guard, WFC pin, utility/ORCA goldens, and — once
# landed — the headless replay/liveness harness). This is the hard gate on every push.
#
# `cargo fmt --check` and `cargo clippy` run as ADVISORY steps (continue-on-error): the codebase predates
# any rustfmt/clippy enforcement (no rustfmt.toml; wider-than-default line width; ~26 standing clippy
# lints), so blocking on them today would fail on untouched code. They surface drift without gating until
# a dedicated cleanup pass lands. Determinism is pinned on this single target (ubuntu-latest) — f32
# gameplay math may diverge on other CPUs/compilers, so treat other platforms with tolerance.
#
# The GPU/visual-regression lane (SSIM over devshot screenshots) is intentionally NOT here; it needs a
# real GPU / software renderer and runs separately.

on:
  push:
    branches: ["**"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (pure-CPU, hard gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Bevy's Linux build needs ALSA / udev / windowing dev headers even though the tests never open a
      # window (they only compile the binary target). No GPU is used by the pure-CPU test suite.
      - name: Install Bevy build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # Hard gate — the deterministic suite must pass. Default features only: the `test-harness` replay /
      # liveness / search-calibration tests are GPU-free (see the `harness` lane) but slower, so they run
      # separately. `#![cfg(feature = "test-harness")]` keeps them out of this compile entirely.
      - name: Test (deterministic core, GPU-free)
        run: cargo test

      # Advisory — reports style/lint drift without blocking (see header note).
      - name: Format check (advisory)
        continue-on-error: true
        run: cargo fmt --all --check

      - name: Clippy (advisory)
        continue-on-error: true
        run: cargo clippy --all-targets --all-features

  # The headless replay / liveness / search-calibration harness. GPU-free: `sim_harness` builds the app
  # with `RenderPlugin { backends: None }`, so no adapter/device is ever created — these tests need no GPU
  # and no software rasteriser (the earlier lavapipe/Mesa setup was vestigial after the harness went
  # backends:None, and `WGPU_BACKEND` was inert). Advisory (`continue-on-error`) for now, but since it no
  # longer needs special hardware it is a candidate for promotion to a hard gate (see TESTING.md). A future
  # SSIM visual-regression pass over `devshot` screenshots would live here.
  harness:
    name: replay + liveness (headless, GPU-free)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install Bevy Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-harness-${{ hashFiles('**/Cargo.lock') }}
      - name: Test (harness — replay + liveness + search-calibration, single-threaded)
        # Serial: headless Apps must not overlap (serial_guard + --test-threads=1).
        run: cargo test --features test-harness -- --test-threads=1

  # Release-profile determinism gate. The shipped game and the `--release` `train` driver run with
  # `debug_assertions` OFF, which ELIDES the `sort_total!` tie-check (util.rs:59) — so a latent tie could,
  # in principle, diverge only in release. This job re-runs the deterministic core under `--release` to
  # prove it does not. LTO / codegen-units are forced OFF here purely for CI speed: they change
  # scheduling/inlining only, never IEEE-754 results, so this still exercises the release-only behaviour
  # (opt-level 3 + assertions off) that actually bears on determinism. The full LTO link is a build-only
  # concern validated at ship time, not a determinism one.
  release-determinism:
    name: determinism (release profile)
    runs-on: ubuntu-latest
    env:
      CARGO_PROFILE_RELEASE_LTO: "false"
      CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
    steps:
      - uses: actions/checkout@v4
      - name: Install Bevy build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}
      - name: Test (deterministic core, release profile)
        run: cargo test --release
